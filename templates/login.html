{% extends 'base.html' %}
{% block content %}
<section class="auth-wrap reveal">
  <article class="surface auth-card panel">
    <div class="section-kicker">CIS9340 / AutoOps</div>
    <h1 class="page-title">Sign in</h1>
    <p class="section-copy">Sign in with your role account to access operational and technical surfaces.</p>

    <form method="post" class="auth-form">
      <input type="hidden" name="next" value="{{ next_target }}">
      <label>
        <span>Username</span>
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="studio-button studio-button-primary" type="submit">
        <span class="material-symbols-outlined">login</span>
        <span>Sign in</span>
      </button>
    </form>

    <p class="auth-note">
      Role access now uses the final <code>LOGIN</code> table joined to
      <code>PERSON</code> and <code>EMPLOYEE</code>; no legacy
      <code>users</code> table is required.
    </p>
  </article>
</section>
{% endblock %}
