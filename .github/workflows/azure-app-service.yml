name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-app-service-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build local virtual environment for App Service
        run: |
          python -m pip install --upgrade pip
          python -m venv antenv
          ./antenv/bin/python -m pip install --upgrade pip
          ./antenv/bin/pip install -r requirements.txt

      - name: Compile Python entrypoints
        run: |
          python -m py_compile db_portal.py application.py run.py

      - name: Create deployment zip with source and dependencies
        run: |
          rm -f deploy.zip
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".pytest_cache/*" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "deploy.zip"
          unzip -l deploy.zip | grep -E "db_portal.py|templates/login.html|antenv/.*/site-packages" | head -20

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Force direct zip deployment settings
        run: |
          az webapp config appsettings set \
            --name cis9340-studio-edwinbrown-20260403 \
            --resource-group rg-cis9340-edwinbrown-20260403 \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              PYTHONPATH=/home/site/wwwroot/antenv/lib/python3.11/site-packages

      - name: Deploy zip directly to Azure Web App
        run: |
          az webapp deploy \
            --name cis9340-studio-edwinbrown-20260403 \
            --resource-group rg-cis9340-edwinbrown-20260403 \
            --src-path deploy.zip \
            --type zip \
            --restart true
