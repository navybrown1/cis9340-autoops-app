name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-app-service-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python entrypoints
        run: |
          python -m py_compile db_portal.py application.py run.py

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restore Oryx deployment settings
        run: |
          az webapp config appsettings set \
            --name cis9340-studio-edwinbrown-20260403 \
            --resource-group rg-cis9340-edwinbrown-20260403 \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true
          az webapp config appsettings delete \
            --name cis9340-studio-edwinbrown-20260403 \
            --resource-group rg-cis9340-edwinbrown-20260403 \
            --setting-names PYTHONPATH || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: cis9340-studio-edwinbrown-20260403
          package: .
